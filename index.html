<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎹 PianoTutor — Learn Piano from YouTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080f;--bg2:#0c0d18;--surf:#111220;--surf2:#181928;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --cyan:#00d4ff;--cyan-dim:rgba(0,212,255,0.15);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.18);
  --green:#34d399;--green-dim:rgba(52,211,153,0.18);
  --red:#f87171;--red-dim:rgba(248,113,113,0.18);
  --amber:#fbbf24;--text:#dde4f0;--muted:#5a6080;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --radius:8px;--wkey-w:28px;--wkey-h:118px;--bkey-w:17px;--bkey-h:70px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(255,255,255,0.035) 1px,transparent 1px);background-size:28px 28px;}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
header{flex-shrink:0;height:56px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:12px;}
.logo{font-family:var(--sans);font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;white-space:nowrap;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.url-wrap{flex:1;display:flex;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 4px 4px 10px;transition:border-color .2s;}
.url-wrap:focus-within{border-color:var(--cyan)}
#url-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:.78rem;}
#url-input::placeholder{color:var(--muted)}
.load-btn{background:var(--cyan);color:#000;border:none;border-radius:6px;padding:6px 16px;font-family:var(--sans);font-weight:700;font-size:.82rem;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap;}
.load-btn:hover{opacity:.85}
.load-btn:active{transform:scale(.97)}
.hdr-badges{display:flex;align-items:center;gap:10px;margin-left:auto}
.badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--surf2);border:1px solid var(--border);font-family:var(--mono);font-size:.68rem;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.badge:hover{border-color:var(--border2);color:var(--text)}
.badge.active{background:var(--green-dim);border-color:rgba(52,211,153,.35);color:var(--green)}
.badge.active .bdot{background:var(--green);box-shadow:0 0 8px var(--green)}
.badge.listening{background:var(--cyan-dim);border-color:rgba(0,212,255,.35);color:var(--cyan)}
.badge.listening .bdot{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 1s ease-in-out infinite}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s}
@keyframes blink{50%{opacity:.25}}
.main{flex:1;display:grid;grid-template-columns:1fr 272px;min-height:0;overflow:hidden;}
.left-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.video-wrap{flex:1;position:relative;background:#000;min-height:0}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:24px;}
.placeholder .emo{font-size:3.5rem;line-height:1;margin-bottom:4px}
.placeholder h2{font-size:1.15rem;font-weight:700;color:var(--text)}
.placeholder p{font-size:.84rem;line-height:1.6;max-width:340px;color:var(--muted)}
.placeholder .hint{margin-top:8px;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:var(--surf);border:1px solid var(--border);font-family:var(--mono);font-size:.72rem;color:var(--muted);}
#yt-player{position:absolute;inset:0;width:100%;height:100%}
.trail-wrap{flex-shrink:0;height:160px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);border-top:1px solid var(--border);position:relative;overflow:hidden;}
#trail-canvas{position:absolute;inset:0;width:100%;height:100%}
...
</style>
</head>
<body>
...
</body>
</html>
